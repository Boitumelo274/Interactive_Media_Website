<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="../CSS/contact.css" />
    <link rel="stylesheet" href="../CSS/home.css" />
    <script src="../JavaScripts/script.js" defer></script>
  </head>
  <body>
    <header class="top-nav">
      <div class="navigation" id="navigation">
        <div class="home">
          <div class="title">MeloCreates</div>

          <div class="image-nav">
            <div id="nav"></div>
          </div>
        </div>
      </div>
    </header>

    <div class="contact-heading">
      <h1>Let's Connect</h1>
      <p class="contact-paragraph">
        If you'd like to reach out or learn more about the ideas behind this
        website, feel free to contact me. I'm open to conversations about
        creativity, culture, and design.
      </p>
    </div>

    <main>
      <section id="contact-section">
        <h2 class="section-heading">Contact</h2>
        <form id="contact-form">
          <div class="form-group">
            <input
              type="text"
              name="user-name"
              id="input-name"
              required
              minlength="5"
              placeholder="Name"
            />
          </div>

          <div class="form-group">
            <input
              type="text"
              name="user-email"
              id="input-email"
              required
              minlength="10"
              placeholder="Email"
            />
          </div>

          <div class="form-group">
            <textarea
              name="message"
              id="input-message"
              placeholder="Message..."
              minlength="10"
              required
            ></textarea>
          </div>
          <button type="submit" id="submit-form">Send</button>
        </form>
      </section>

      <p class="closure">I'll get back to you as soon as I can</p>
    </main>
    <footer class="footer">
      <p>
        &copy;
        <time datetime="2026-04-22">2026</time>
        MeloCreates. All rights reserved.
      </p>
    </footer>
  </body>
</html>
